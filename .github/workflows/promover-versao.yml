name: Promover Estágio da Versão (Manual)

on:
  workflow_dispatch:
    inputs:
      sistema_id:
        description: 'Id do sistema na Tb_Sistema'
        required: true
        default: '1'
        type: string
      novo_estagio:
        description: 'Novo estágio da versão'
        required: true
        default: 'Beta'
        type: choice
        options:
        - Alpha                # <--- Desenvolvimento inicial
        - Beta                 # <--- Testes de usuários chave
        - Release Candidate    # <--- Candidata a oficial (NOVO)
        - Stable               # <--- Produção oficial

permissions:
  contents: write

jobs:
  promover:
    runs-on: self-hosted  # Roda no mesmo servidor do deploy

    steps:
    - name: Baixar código atualizado
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Atualizar VERSION no repositório
      shell: powershell
      run: |
        $PythonPath = "C:\ProjetosPython\Luft-ConnectAir\.venv\Scripts\python.exe"
        $SistemaId = "${{ inputs.sistema_id }}"
        $Estagio = "${{ inputs.novo_estagio }}"
        
        if (-not (Test-Path $PythonPath)) {
          Write-Error "Python da aplicação não encontrado em $PythonPath."
          exit 1
        }

        Write-Host "Atualizando VERSION para $Estagio..."
        
        & $PythonPath Scripts/GestaoVersao.py --sistema-id "$SistemaId" promover --estagio "$Estagio" --somente-arquivo
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Falha ao atualizar o arquivo VERSION para o sistema $SistemaId. Código: $LASTEXITCODE"
          exit $LASTEXITCODE
        }

    - name: Commitar VERSION atualizado
      shell: powershell
      run: |
        if (-not (git status --short -- VERSION)) {
          Write-Host "VERSION já estava no estágio solicitado. Nenhum commit necessário."
          exit 0
        }

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add VERSION
        git commit -m "chore(version): promover para ${{ inputs.novo_estagio }}"
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Falha ao criar commit da promoção de versão. Código: $LASTEXITCODE"
          exit $LASTEXITCODE
        }

        git push origin HEAD:main
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Falha ao publicar o VERSION atualizado na main. Código: $LASTEXITCODE"
          exit $LASTEXITCODE
        }

        Write-Host "VERSION publicado na main. O deploy automático fará a sincronização no banco."